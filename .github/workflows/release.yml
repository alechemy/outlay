name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    uses: ./.github/workflows/ci.yml

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Check tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi
      - name: Publish to npm
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "outlay@$VERSION" version >/dev/null 2>&1; then
            echo "outlay@$VERSION is already on the registry; skipping publish"
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub release from the CHANGELOG section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            BEGIN { gsub(/\./, "\\.", ver) }
            $0 ~ "^## " ver "( |$)" { found = 1; next }
            /^## / { if (found) exit }
            found { print }
          ' CHANGELOG.md > "$RUNNER_TEMP/notes.md"
          if ! [ -s "$RUNNER_TEMP/notes.md" ]; then
            echo "No CHANGELOG.md section found for $VERSION" >&2
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "outlay $VERSION" \
            --notes-file "$RUNNER_TEMP/notes.md" \
            --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
