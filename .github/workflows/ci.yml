name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm run test:trace
      - run: npm run test:validate
      - run: npm run test:api
      - run: npm run test:text
      - run: npm run test:svg
      - run: npm run test:html
      - run: npm run test:testing
      - run: npm run package-smoke-test
      - run: npm run test:example
      - run: npx puppeteer browsers install chrome
      - run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - run: npm run verify:explorer
      - run: npm run verify:text-demo
      - run: npm run verify:html-demo
      - run: npm run bench
