<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='3' fill='%232f9e44'/><path d='M6.5 2v12M2 6.5h12' stroke='white' stroke-width='1.6'/></svg>">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout Explorer — outlay</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      :root {
        color-scheme: light;
        --page: #f5f1ea;
        --panel: #fffdf8;
        --ink: #201b18;
        --muted: #6d645d;
        --rule: #d8cec3;
        --accent: #955f3b;
        --accent-light: #c4865e;
        --selected: #f0e4d6;
        --danger: #c44;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: var(--page);
        color: var(--ink);
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 13px;
        display: flex;
        flex-direction: column;
      }

      /* Top bar */
      .topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        border-bottom: 1px solid var(--rule);
        background: var(--panel);
        flex-shrink: 0;
      }
      .topbar h1 {
        font:
          600 15px/1.2 "Helvetica Neue",
          Helvetica,
          Arial,
          sans-serif;
        color: var(--ink);
      }
      .topbar .eyebrow {
        font:
          11px/1.2 "SF Mono",
          ui-monospace,
          monospace;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
        text-decoration: none;
      }
      .topbar .eyebrow:hover {
        text-decoration: underline;
      }
      .topbar .spacer {
        flex: 1;
      }
      .topbar .timing {
        font:
          11px/1 "SF Mono",
          ui-monospace,
          monospace;
        color: var(--muted);
      }

      /* Main layout */
      .main {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      /* Left panel: tree + controls */
      .left-panel {
        width: 320px;
        min-width: 260px;
        border-right: 1px solid var(--rule);
        background: var(--panel);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex-shrink: 0;
      }
      .tree-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--rule);
      }
      .tree-header h2 {
        font:
          600 12px/1.2 "Helvetica Neue",
          Helvetica,
          Arial,
          sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        flex: 1;
      }
      .tree-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
      }

      /* Tree nodes */
      .tree-node {
        cursor: pointer;
        user-select: none;
      }
      .tree-node-row {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 3px 12px 3px 0;
        border-radius: 4px;
        transition: background 80ms;
      }
      .tree-node-row:hover {
        background: rgba(0, 0, 0, 0.04);
      }
      .tree-node-row.selected {
        background: var(--selected);
      }
      .tree-node-toggle {
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        color: var(--muted);
        flex-shrink: 0;
      }
      .tree-node-label {
        font:
          12px/1.3 "SF Mono",
          ui-monospace,
          monospace;
        color: var(--ink);
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tree-node-children {
        padding-left: 16px;
      }

      /* Properties panel */
      .props-panel {
        border-top: 1px solid var(--rule);
        padding: 12px;
        overflow-y: auto;
        max-height: 50%;
      }
      .props-panel h3 {
        font:
          600 11px/1.2 "Helvetica Neue",
          Helvetica,
          Arial,
          sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .prop-group {
        margin-bottom: 12px;
      }
      .prop-group-label {
        font:
          600 11px/1.2 "Helvetica Neue",
          Helvetica,
          Arial,
          sans-serif;
        color: var(--accent);
        margin-bottom: 6px;
      }
      .prop-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 5px;
      }
      .prop-row label {
        font:
          11px/1.2 "SF Mono",
          ui-monospace,
          monospace;
        color: var(--muted);
        width: 104px;
        flex-shrink: 0;
        text-align: right;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .prop-row input[type="range"] {
        flex: 1;
        accent-color: var(--accent);
      }
      .prop-row .value {
        font:
          11px/1 "SF Mono",
          ui-monospace,
          monospace;
        color: var(--ink);
        width: 36px;
        text-align: right;
        flex-shrink: 0;
      }
      .prop-row select {
        flex: 1;
        font:
          12px/1.3 "SF Mono",
          ui-monospace,
          monospace;
        border: 1px solid var(--rule);
        border-radius: 4px;
        padding: 2px 4px;
        background: white;
        color: var(--ink);
      }
      .prop-row input[type="text"] {
        flex: 1;
        min-width: 0;
        font:
          11px/1.3 "SF Mono",
          ui-monospace,
          monospace;
        border: 1px solid var(--rule);
        border-radius: 4px;
        padding: 3px 5px;
        background: white;
        color: var(--ink);
      }
      .prop-row input[type="text"]:focus {
        outline: none;
        border-color: var(--accent-light);
      }

      /* Buttons */
      .btn {
        font:
          500 11px/1 "Helvetica Neue",
          Helvetica,
          Arial,
          sans-serif;
        padding: 5px 10px;
        border: 1px solid var(--rule);
        border-radius: 6px;
        background: white;
        color: var(--ink);
        cursor: pointer;
        transition:
          background 80ms,
          border-color 80ms;
      }
      .btn:hover {
        border-color: var(--accent-light);
        background: #faf6f0;
      }
      .btn-accent {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn-danger {
        border-color: var(--danger);
        color: var(--danger);
      }
      .btn-danger:hover {
        background: #fef0f0;
      }

      .node-actions {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }

      /* Right panel: output */
      .right-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .output-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--rule);
      }
      .output-header h2 {
        font:
          600 12px/1.2 "Helvetica Neue",
          Helvetica,
          Arial,
          sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        flex: 1;
      }
      .output-viewport {
        flex: 1;
        overflow: auto;
        padding: 24px;
        position: relative;
      }
      .output-panes {
        display: flex;
        gap: 40px;
        align-items: flex-start;
        flex-wrap: wrap;
      }
      .pane-title {
        font:
          600 11px/1.2 "Helvetica Neue",
          Helvetica,
          Arial,
          sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .output-container {
        position: relative;
        display: inline-block;
      }
      .match-status {
        font:
          11px/1 "SF Mono",
          ui-monospace,
          monospace;
      }
      .match-status.ok {
        color: #2e7d32;
      }
      .match-status.bad {
        color: var(--danger);
      }

      /* Rendered boxes */
      .layout-box {
        position: absolute;
        border: 1px solid rgba(0, 0, 0, 0.15);
        border-radius: 3px;
        transition: box-shadow 120ms;
        cursor: pointer;
      }
      .layout-box:hover {
        box-shadow: 0 0 0 2px var(--accent-light);
      }
      .layout-box.highlighted {
        box-shadow: 0 0 0 2px var(--accent);
      }
      .layout-box.mismatch {
        box-shadow: 0 0 0 2px var(--danger);
      }

      /* Browser CSS reference boxes: outline instead of border so the
         decoration doesn't participate in the layout being compared. */
      .ref-box {
        position: relative;
        outline: 1px solid rgba(0, 0, 0, 0.15);
        outline-offset: -1px;
        border-radius: 3px;
        cursor: pointer;
        transition: box-shadow 120ms;
      }
      .ref-box:hover {
        box-shadow: 0 0 0 2px var(--accent-light);
      }
      .ref-box.highlighted {
        box-shadow: 0 0 0 2px var(--accent);
      }
      .layout-box-label {
        position: absolute;
        top: 2px;
        left: 4px;
        font:
          10px/1.2 "SF Mono",
          ui-monospace,
          monospace;
        color: rgba(0, 0, 0, 0.5);
        pointer-events: none;
        white-space: nowrap;
      }
      .layout-box-dims {
        position: absolute;
        bottom: 2px;
        right: 4px;
        font:
          9px/1 "SF Mono",
          ui-monospace,
          monospace;
        color: rgba(0, 0, 0, 0.4);
        pointer-events: none;
        white-space: nowrap;
      }

      /* Detail panel (bottom right) */
      .detail-panel {
        border-top: 1px solid var(--rule);
        padding: 10px 16px;
        background: var(--panel);
        font:
          11px/1.5 "SF Mono",
          ui-monospace,
          monospace;
        color: var(--muted);
        max-height: 140px;
        overflow-y: auto;
        flex-shrink: 0;
      }
      .detail-panel .detail-title {
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 4px;
      }
      .detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 2px 16px;
      }
      .detail-grid span {
        white-space: nowrap;
      }
      .detail-key {
        color: var(--muted);
      }
      .detail-val {
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <a class="eyebrow" href="index.html">← all demos</a>
      <h1>Layout Explorer</h1>
      <div class="spacer"></div>
      <span class="timing" id="timing"></span>
      <button class="btn" id="btn-export">Export JSON</button>
    </div>

    <div class="main">
      <div class="left-panel">
        <div class="tree-header">
          <h2>Tree</h2>
          <button class="btn btn-accent" id="btn-add-root-child">
            + Add Child
          </button>
        </div>
        <div class="tree-scroll" id="tree"></div>
        <div class="props-panel" id="props"></div>
      </div>
      <div class="right-panel">
        <div class="output-header">
          <h2>Solved Layout</h2>
          <span class="match-status" id="match-status"></span>
        </div>
        <div class="output-viewport" id="viewport">
          <div class="output-panes">
            <div>
              <div class="pane-title">Solver</div>
              <div class="output-container" id="output"></div>
            </div>
            <div>
              <div class="pane-title">Browser CSS reference</div>
              <div class="output-container" id="ref-output"></div>
            </div>
          </div>
        </div>
        <div class="detail-panel" id="detail">
          <span style="color: var(--muted)"
            >Click a node to see its resolved box values.</span
          >
        </div>
      </div>
    </div>

    <script type="module" src="./explorer.ts"></script>
  </body>
</html>
